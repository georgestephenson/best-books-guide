name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# One in-flight run per ref; new pushes cancel the old (keeps the queue short).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint · format · typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: test · coverage gates
    runs-on: ubuntu-24.04
    # Real PG 18 + Redis 8 back the integration suite (docs/02); migrations are
    # applied by globalSetup, so every run doubles as a migration test.
    services:
      postgres:
        image: postgres:18 # must match compose + the Ansible role — uuidv7() is PG18-native
        env:
          POSTGRES_USER: bestbooks
          POSTGRES_PASSWORD: bestbooks
          POSTGRES_DB: bestbooks_test # the harness default TEST_DATABASE_URL points here
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bestbooks"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build

  audit:
    name: dependency audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
