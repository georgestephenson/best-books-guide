name: Terraform

on:
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'

permissions:
  contents: read

# Static checks only — no AWS credentials. plan/apply stays local for M1 (the CI
# OIDC role is scoped to S3 release uploads); moving apply into CI is a follow-up.
jobs:
  validate:
    name: fmt · validate · tflint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      # Third-party actions: Dependabot pins/updates these to SHAs (see dependabot.yml).
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.12'
          terraform_wrapper: false

      - name: Format check
        run: terraform fmt -check -recursive infra/terraform

      - name: Validate bootstrap
        working-directory: infra/terraform/bootstrap
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate envs/prod
        working-directory: infra/terraform/envs/prod
        run: |
          terraform init -backend=false
          terraform validate

      - uses: terraform-linters/setup-tflint@v6
      - name: tflint
        working-directory: infra/terraform
        run: |
          tflint --init
          tflint --recursive
