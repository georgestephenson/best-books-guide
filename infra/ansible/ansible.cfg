[defaults]
inventory = inventories/prod/hosts.yml
roles_path = roles
host_key_checking = True
retry_files_enabled = False
# YAML-formatted task output via the built-in default callback (the old
# community.general.yaml stdout callback was removed in community.general 12).
result_format = yaml
interpreter_python = auto_silent
force_color = True

[privilege_escalation]
become = True
become_method = sudo
become_user = root
