---
# Ship one release: fetch the CI-built tarball from S3, swap the `current`
# symlink, restart, and health-check. Run with -e release_sha=<git-sha>.
- name: Deploy a release
  hosts: all
  become: true
  tasks:
    - name: Require release_sha
      ansible.builtin.assert:
        that:
          - release_sha is defined
          - release_sha | length > 0
        fail_msg: "Pass the release: -e release_sha=<git-sha>"

    - name: Create the release directory
      ansible.builtin.file:
        path: "{{ app_dir }}/releases/{{ release_sha }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    - name: Fetch the release tarball from S3 (via the instance role)
      ansible.builtin.command:
        cmd: >-
          aws s3 cp
          s3://{{ releases_bucket }}/release-{{ release_sha }}.tar.gz
          /tmp/release-{{ release_sha }}.tar.gz
          --region {{ aws_region }}
        creates: "/tmp/release-{{ release_sha }}.tar.gz"

    - name: Unpack the release
      ansible.builtin.unarchive:
        src: "/tmp/release-{{ release_sha }}.tar.gz"
        dest: "{{ app_dir }}/releases/{{ release_sha }}"
        remote_src: true
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        creates: "{{ app_dir }}/releases/{{ release_sha }}/apps/api/dist/main.js"

    # Its own file, not the Ansible-rendered .env — otherwise the next site.yml
    # run re-templates .env and wipes the stamp back to 'unknown'.
    - name: Stamp APP_VERSION with the release SHA
      ansible.builtin.copy:
        dest: "{{ app_dir }}/shared/.env.release"
        content: "APP_VERSION={{ release_sha }}\n"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0640"

    # Migrations run against the OLD app still serving on the OLD schema, so they
    # must be expand-only/backward-compatible (docs/03, docs/07). The pre-migration
    # dump is the rollback safety net — a symlink rollback does not revert schema.
    - name: Ensure the pre-migration backup directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}/backups"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Back up the database before migrating
      ansible.builtin.shell:
        cmd: >-
          runuser -u postgres -- pg_dump --format=custom {{ app_name }}
          > {{ app_dir }}/backups/pre-{{ release_sha }}.dump
        creates: "{{ app_dir }}/backups/pre-{{ release_sha }}.dump"

    # dist/migrate.js takes a PG advisory lock, so overlapping deploys can't race.
    # Only DATABASE_URL is needed; every other config key has a schema default.
    - name: Apply database migrations
      ansible.builtin.command:
        cmd: /usr/bin/node {{ app_dir }}/releases/{{ release_sha }}/apps/api/dist/migrate.js
      become: true
      become_user: "{{ app_user }}"
      environment:
        NODE_ENV: production
        DATABASE_URL: "{{ database_url }}"
      changed_when: true

    - name: Point 'current' at the new release
      ansible.builtin.file:
        src: "{{ app_dir }}/releases/{{ release_sha }}"
        dest: "{{ app_dir }}/current"
        state: link
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
      notify: Restart bestbooks-api

    - name: Restart before the health check
      ansible.builtin.meta: flush_handlers

    - name: Wait for the app to report healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/healthz"
        status_code: 200
      register: health
      retries: 10
      delay: 3
      until: health.status == 200

    - name: Prune old releases (keep the newest {{ keep_releases }})
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ls -1dt {{ app_dir }}/releases/*/ | tail -n +{{ keep_releases + 1 }} | xargs -r rm -rf
        executable: /bin/bash
      changed_when: true

  handlers:
    - name: Restart bestbooks-api
      ansible.builtin.systemd_service:
        name: bestbooks-api
        state: restarted
