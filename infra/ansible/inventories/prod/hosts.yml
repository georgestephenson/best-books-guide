---
all:
  hosts:
    bestbooks-prod:
      # The EC2 instance ID, not an IP: we reach the host by tunnelling SSH over
      # SSM. Nothing needs inbound port 22, and there's no IP allowlist to chase
      # when an ISP rotates the admin's address or CI runs from a random runner.
      # From: terraform -chdir=infra/terraform/envs/prod output instance_id
      ansible_host: i-0dc5e6872fb8112d6
  vars:
    ansible_user: ubuntu
    ansible_python_interpreter: /usr/bin/python3
    # Requires the AWS CLI + session-manager-plugin and AWS credentials in the
    # environment. Host keys still authenticate the host; the tunnel itself is
    # authorised by IAM.
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=accept-new
      -o ProxyCommand="aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters portNumber=%p --region eu-west-2"
