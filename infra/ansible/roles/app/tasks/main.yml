---
- name: Create the /srv directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  loop:
    - "{{ app_dir }}"
    - "{{ app_dir }}/releases"
    - "{{ app_dir }}/shared"
    - "{{ app_dir }}/media"

- name: Render the environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/shared/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0640"

- name: Install the systemd unit
  ansible.builtin.template:
    src: bestbooks-api.service.j2
    dest: /etc/systemd/system/bestbooks-api.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable the service (first start happens on deploy)
  ansible.builtin.systemd_service:
    name: bestbooks-api
    enabled: true
