---
- name: Set timezone to UTC
  community.general.timezone:
    name: Etc/UTC

- name: Install base packages
  ansible.builtin.apt:
    name:
      - acl
      - ca-certificates
      - curl
      - gnupg
      - unzip
      - zstd
      - awscli
      - fail2ban
      - unattended-upgrades
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create the application group
  ansible.builtin.group:
    name: "{{ app_group }}"
    system: true

- name: Create the application user
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ app_dir }}"
    create_home: false

- name: Harden SSH (no root login, keys only)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
    owner: root
    group: root
    mode: "0644"
  notify: Restart ssh

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

- name: Enable the fail2ban sshd jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    content: |
      [sshd]
      enabled = true
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Default-deny incoming traffic
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Default-allow outgoing traffic
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH, HTTP and HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ["22", "80", "443"]

- name: Enable UFW
  community.general.ufw:
    state: enabled
