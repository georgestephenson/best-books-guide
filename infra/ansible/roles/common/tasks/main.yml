---
- name: Set timezone to UTC
  community.general.timezone:
    name: Etc/UTC

- name: Install base packages
  ansible.builtin.apt:
    name:
      - acl
      - ca-certificates
      - curl
      - gnupg
      - unzip
      - zstd
      - fail2ban
      - unattended-upgrades
    state: present
    update_cache: true
    cache_valid_time: 3600

# awscli isn't packaged for Ubuntu 24.04; install AWS CLI v2 (arm64) from AWS.
# The host needs it so the deploy pulls release tarballs from S3 via its instance role.
- name: Check whether the AWS CLI is installed
  ansible.builtin.command: aws --version
  register: common_aws_cli
  changed_when: false
  failed_when: false

- name: Download the AWS CLI v2 installer (arm64)
  ansible.builtin.get_url:
    url: https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip
    dest: /tmp/awscliv2.zip
    mode: "0644"
  when: common_aws_cli.rc != 0

- name: Unpack the AWS CLI v2 installer
  ansible.builtin.unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp
    remote_src: true
  when: common_aws_cli.rc != 0

- name: Install the AWS CLI v2
  ansible.builtin.command: /tmp/aws/install
  when: common_aws_cli.rc != 0
  changed_when: true

- name: Create the application group
  ansible.builtin.group:
    name: "{{ app_group }}"
    system: true

- name: Create the application user
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ app_dir }}"
    create_home: false

- name: Harden SSH (no root login, keys only)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
    owner: root
    group: root
    mode: "0644"
  notify: Restart ssh

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

- name: Enable the fail2ban sshd jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    content: |
      [sshd]
      enabled = true
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Default-deny incoming traffic
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Default-allow outgoing traffic
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH, HTTP and HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ["22", "80", "443"]

- name: Enable UFW
  community.general.ufw:
    state: enabled
