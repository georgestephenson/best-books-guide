---
- name: Install monit
  ansible.builtin.apt:
    name: monit
    state: present
    update_cache: true

- name: Render the main monitrc
  ansible.builtin.template:
    src: monitrc.j2
    dest: /etc/monit/monitrc
    owner: root
    group: root
    mode: "0600" # monit refuses to start if monitrc is group/world-readable
  notify: Restart monit

- name: Render the app checks
  ansible.builtin.template:
    src: bestbooks.conf.j2
    dest: /etc/monit/conf.d/bestbooks.conf
    owner: root
    group: root
    mode: "0600"
  notify: Restart monit

- name: Enable and start monit
  ansible.builtin.systemd_service:
    name: monit
    enabled: true
    state: started
