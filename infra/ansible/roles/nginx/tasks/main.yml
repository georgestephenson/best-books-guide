---
- name: Install nginx and certbot
  ansible.builtin.apt:
    name:
      - nginx
      - certbot
    state: present
    update_cache: true

- name: Create the ACME webroot
  ansible.builtin.file:
    path: /var/www/certbot
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Remove the default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Check for an existing TLS certificate
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ domain_name }}/fullchain.pem"
  register: nginx_le_cert

# First run only: serve plain HTTP so certbot's webroot challenge can succeed.
- name: Install the bootstrap HTTP vhost (until a cert exists)
  ansible.builtin.template:
    src: nginx-bootstrap.conf.j2
    dest: "/etc/nginx/sites-available/{{ app_name }}.conf"
    owner: root
    group: root
    mode: "0644"
  when: not nginx_le_cert.stat.exists
  notify: Reload nginx

- name: Enable the vhost
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ app_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ app_name }}.conf"
    state: link
  notify: Reload nginx

- name: Apply the bootstrap config before requesting a cert
  ansible.builtin.meta: flush_handlers

- name: Obtain the Let's Encrypt certificate
  ansible.builtin.command:
    cmd: >-
      certbot certonly --webroot -w /var/www/certbot
      -d {{ domain_name }} -d www.{{ domain_name }}
      --non-interactive --agree-tos -m {{ admin_email }} --keep-until-expiring
    creates: "/etc/letsencrypt/live/{{ domain_name }}/fullchain.pem"

- name: Install the full TLS vhost
  ansible.builtin.template:
    src: nginx-vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ app_name }}.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Reload nginx after a certbot renewal
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
    content: |
      #!/usr/bin/env bash
      systemctl reload nginx
    owner: root
    group: root
    mode: "0755"

- name: Enable and start nginx
  ansible.builtin.systemd_service:
    name: nginx
    enabled: true
    state: started
