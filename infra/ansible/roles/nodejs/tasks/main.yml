---
- name: Ensure the apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download the NodeSource signing key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

- name: Add the NodeSource repository
  ansible.builtin.deb822_repository:
    name: nodesource
    types: [deb]
    uris: "https://deb.nodesource.com/node_{{ node_major }}.x"
    suites: nodistro
    components: [main]
    signed_by: /etc/apt/keyrings/nodesource.asc
    state: present

- name: Install Node.js (bundles npm)
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
