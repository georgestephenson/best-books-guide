---
# Full host convergence — safe to re-run (idempotent). Bootstraps a fresh host
# and fixes drift on an existing one.
- name: Converge the Best Books Guide host
  hosts: all
  become: true
  roles:
    - common
    - nodejs
    # Data stores before `app`: the API's config schema requires DATABASE_URL and
    # REDIS_URL at boot, so the stores and the rendered .env must exist first.
    - postgresql
    - redis
    - app
    - nginx
    - monit
    - backup
